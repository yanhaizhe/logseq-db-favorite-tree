name: Build and Publish Plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: logseq-db-favorite-tree
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        id: build
        run: |
          npm run build
          echo "tag_name=$(git tag --sort version:refname | tail -n 1)" >> $GITHUB_OUTPUT

      - name: Package release zip
        run: |
          STAGING="release/${PLUGIN_NAME}"
          mkdir -p "${STAGING}"

          cp README.md icon.svg package.json "${STAGING}/"
          cp -R dist/* "${STAGING}/"

          sed -i 's/"dist\/index.html"/"index.html"/g' "${STAGING}/package.json"

          cd release
          zip -r "${PLUGIN_NAME}.zip" "${PLUGIN_NAME}"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.PLUGIN_NAME }} ${{ steps.build.outputs.tag_name }}
          files: |
            release/${{ env.PLUGIN_NAME }}.zip
            package.json
