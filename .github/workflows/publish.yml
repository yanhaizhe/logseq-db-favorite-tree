name: Publish Plugin Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: logseq-db-favorite-tree
  NODE_VERSION: "23"

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release zip
        run: |
          TAG="${{ github.ref_name }}"
          STAGING="release/${PLUGIN_NAME}"
          ZIPNAME="${PLUGIN_NAME}-${TAG}.zip"
          mkdir -p "${STAGING}"
          
          cp README.md icon.svg package.json "${STAGING}/"
          cp -R dist/* "${STAGING}/"
          
          sed -i 's/"dist\/index.html"/"index.html"/g' "${STAGING}/package.json"
          
          cd release
          zip -r "${ZIPNAME}" "${PLUGIN_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}
          path: release/${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip

      - name: Attach zip to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
