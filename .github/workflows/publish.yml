name: Publish Plugin Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: logseq-db-favorite-tree
  NODE_VERSION: "20"

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release zip
        run: |
          mkdir -p release/${PLUGIN_NAME}
          cp package.json README.md icon.svg release/${PLUGIN_NAME}/
          cp -R dist release/${PLUGIN_NAME}/dist
          cd release
          zip -r ${PLUGIN_NAME}.zip ${PLUGIN_NAME}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-release
          path: release/${{ env.PLUGIN_NAME }}.zip

      - name: Attach zip to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.PLUGIN_NAME }}.zip
