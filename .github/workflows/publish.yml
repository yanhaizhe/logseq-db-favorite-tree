name: Publish Plugin Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: logseq-db-favorite-tree
  NODE_VERSION: "20"

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release zip
        run: |
          # Create a staging directory for the clean release
          STAGING="release/${PLUGIN_NAME}"
          mkdir -p "${STAGING}"
          
          # Copy only necessary assets to the root of the staging folder
          cp README.md icon.svg package.json "${STAGING}/"
          cp -R dist/* "${STAGING}/"
          
          # Update package.json to point to index.html at the root (flattened)
          # We use sed to remove "dist/" prefix from the "main" and "logseq.main" fields
          sed -i 's/"dist\/index.html"/"index.html"/g' "${STAGING}/package.json"
          
          # Zip the plugin folder
          cd release
          zip -r "${PLUGIN_NAME}.zip" "${PLUGIN_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-release
          path: release/${{ env.PLUGIN_NAME }}.zip

      - name: Attach zip to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.PLUGIN_NAME }}.zip
